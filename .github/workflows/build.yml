name: Build Praat (Japanese)

# upstream の Praat ソースに翻訳パッチを当ててから3プラットフォームでビルドする。

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------
  # 翻訳適用 (全ビルドの前段)
  # -----------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      praat_sha: ${{ steps.upstream.outputs.sha }}
      praat_tag: ${{ steps.upstream.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve upstream Praat version
        id: upstream
        run: |
          cd upstream
          SHA=$(git rev-parse HEAD)
          TAG=$(git describe --tags --exact-match 2>/dev/null || git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml

      - name: Apply translations
        run: |
          # --files で対象を明示。指定しないと YAML の files: フィールドから推定するが、
          # menus.yaml はプレーンキー値形式で files が無いので、誤って別ファイルだけが
          # 拾われてしまうバグを避けるため明示する。
          python3 scripts/apply_translations.py \
            --upstream upstream \
            --translations translations \
            --files sys/praat_objectMenus.cpp

      - name: Verify translations were applied
        run: |
          echo "==> Japanese string count in patched source:"
          grep -c 'U"[^"]*[ぁ-んァ-ヶ一-龯][^"]*"' upstream/sys/praat_objectMenus.cpp || true
          echo ""
          echo "==> Sample of patched lines (first 10):"
          grep -n '便利な機能\|詳細設定\|ウィンドウ\|メニューコマンドを追加\|マニュアル' \
            upstream/sys/praat_objectMenus.cpp | head -10 || true

      - name: Upload patched upstream
        uses: actions/upload-artifact@v4
        with:
          name: patched-upstream
          path: upstream/
          retention-days: 1
          include-hidden-files: true

  # -----------------------------------------------------------
  # Linux ビルド  (top-level Makefile に任せる)
  # -----------------------------------------------------------
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: patched-upstream
          path: upstream/

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libpulse-dev libasound2-dev libjack-jackd2-dev

      - name: Build Praat (Linux x64v3)
        run: |
          cd upstream
          make PRAAT_OS=linux PRAAT_ARCH=x64v3 -j$(nproc) 2>&1 | tail -200 || (
            echo "==> Detailed build failure, last 400 lines:"
            make PRAAT_OS=linux PRAAT_ARCH=x64v3 -j1 2>&1 | tail -400
            exit 1
          )

      - name: Locate praat binary
        id: find_bin
        run: |
          cd upstream
          BIN=$(find . -maxdepth 3 -name "praat" -type f -perm -u+x | head -1)
          if [ -z "$BIN" ]; then
            echo "praat binary not found"; exit 1
          fi
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
          ls -lh "$BIN"

      - name: Verify Japanese strings in binary
        run: |
          BIN="upstream/${{ steps.find_bin.outputs.path }}"
          if strings "$BIN" 2>/dev/null | grep -E '開く|設定|ウィンドウ' >/dev/null; then
            echo "✅ Japanese strings present in binary"
          else
            echo "⚠️ Japanese strings not found by 'strings' (may be UTF-16/32 encoded)"
          fi

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/praat-ja-linux-x64.tar.gz -C upstream "${{ steps.find_bin.outputs.path }}"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: praat-ja-linux
          path: dist/praat-ja-linux-x64.tar.gz

  # -----------------------------------------------------------
  # Windows ビルド (MSYS2 + CLANG64)
  # -----------------------------------------------------------
  build-windows:
    needs: prepare
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: patched-upstream
          path: upstream/

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            make
            pkg-config
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-pkgconf

      - name: Build Praat (Windows x64v3)
        run: |
          cd upstream
          make PRAAT_OS=windows PRAAT_ARCH=x64v3 -j$(nproc) 2>&1 | tail -200 || (
            echo "==> Detailed build failure, last 400 lines:"
            make PRAAT_OS=windows PRAAT_ARCH=x64v3 -j1 2>&1 | tail -400
            exit 1
          )

      - name: Locate Praat.exe
        id: find_bin
        run: |
          cd upstream
          BIN=$(find . -maxdepth 3 -iname "praat*.exe" | head -1)
          if [ -z "$BIN" ]; then
            echo "Praat.exe not found"; exit 1
          fi
          echo "path=$BIN" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          mkdir -p dist
          cp "upstream/${{ steps.find_bin.outputs.path }}" dist/Praat-ja.exe
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: praat-ja-windows
          path: dist/Praat-ja.exe

  # -----------------------------------------------------------
  # macOS ビルド
  # Xcode プロジェクトは source repo に無いので、最新リリースの
  # praatXXXX_xcodeproj.zip を取得して source tree に展開してから build.
  #
  # Praat の .xcodeproj は Xcode 26 (objectVersion 70) で作られているため、
  # 古い Xcode を持つランナーでは "future Xcode project file format" エラーになる。
  # 対策として macos-latest (現時点で macos-15) で最新の Xcode を選び、
  # それでも開けない場合は project.pbxproj の objectVersion を旧形式に
  # 書き換える「ダウングレード」フォールバックを試す。
  # 試行錯誤中なので、失敗しても他ジョブをブロックしない (continue-on-error)。
  # -----------------------------------------------------------
  build-macos:
    needs: prepare
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: patched-upstream
          path: upstream/

      - name: Select latest Xcode
        run: |
          echo "==> Available Xcode versions:"
          ls /Applications/ | grep -i xcode || true
          # 最新の Xcode_*.app を選ぶ (バージョン番号でソート)
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$LATEST" ]; then
            LATEST="/Applications/Xcode.app"
          fi
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"

      - name: Show environment
        run: |
          xcodebuild -version
          xcode-select -p
          sw_vers
          uname -a

      - name: Verify upstream source tree
        run: |
          echo "==> upstream/ contents:"
          ls -la upstream/ | head -30
          echo ""
          echo "==> Sanity check (sys/, fon/, main/ should exist):"
          ls -ld upstream/sys upstream/fon upstream/main 2>&1 || true

      - name: Fetch xcodeproj.zip from latest Praat release
        id: fetch_xcode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub API は匿名だと共有IPでレート制限に当たりやすいので
          # ワークフロー内蔵のトークンを付けて 403 を回避する。
          API="https://api.github.com/repos/praat/praat.github.io/releases/latest"
          URL=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$API" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if 'xcodeproj' in a['name'] and a['name'].endswith('.zip'):
                  print(a['browser_download_url']); break
          ")
          if [ -z "$URL" ]; then
            echo "Could not find xcodeproj asset URL"; exit 1
          fi
          echo "Downloading: $URL"
          curl -fsSL -o xcodeproj.zip "$URL"
          ls -lh xcodeproj.zip
          echo ""
          echo "==> Zip contents:"
          unzip -l xcodeproj.zip | head -30
          echo ""
          echo "==> Extracting into upstream/ ..."
          unzip -o -q xcodeproj.zip -d upstream/
          echo ""
          echo "==> upstream/ after extract:"
          ls -la upstream/ | head -30
          echo ""
          echo "==> Searching for .xcodeproj anywhere:"
          find upstream -maxdepth 4 -name "*.xcodeproj" -type d
          PROJ=$(find upstream -maxdepth 4 -name "*.xcodeproj" -type d | head -1)
          if [ -z "$PROJ" ]; then
            echo "ERROR: xcodeproj not found after extraction"
            echo "==> Top-level directories within upstream:"
            find upstream -maxdepth 2 -type d | head -30
            exit 1
          fi
          echo "proj=$PROJ" >> "$GITHUB_OUTPUT"
          echo "==> Using project: $PROJ"

      - name: Inspect Xcode project
        id: inspect
        run: |
          PROJ="${{ steps.fetch_xcode.outputs.proj }}"
          echo "==> Project dir contents:"
          ls -la "$PROJ" | head
          echo ""
          echo "==> Project objectVersion:"
          grep -E "objectVersion\s*=" "$PROJ/project.pbxproj" | head -3 || true
          echo ""
          echo "==> Trying xcodebuild -list (this may fail if format is too new):"
          if xcodebuild -project "$PROJ" -list 2>&1 | tee /tmp/xclist.txt; then
            echo "needs_downgrade=false" >> "$GITHUB_OUTPUT"
          else
            if grep -q "future Xcode project file format" /tmp/xclist.txt; then
              echo "==> Project is in a future format; will downgrade"
              echo "needs_downgrade=true" >> "$GITHUB_OUTPUT"
            else
              echo "needs_downgrade=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Downgrade Xcode project format if needed
        if: steps.inspect.outputs.needs_downgrade == 'true'
        run: |
          PROJ="${{ steps.fetch_xcode.outputs.proj }}"
          PBX="$PROJ/project.pbxproj"
          echo "==> Backing up original pbxproj"
          cp "$PBX" "$PBX.orig"
          echo "==> Original objectVersion:"
          grep -E "objectVersion\s*=" "$PBX" | head -3
          # objectVersion 70 (Xcode 26) → 56 (Xcode 14-15) に落とす
          # 過激な書き換えだが、ソース・ターゲット情報は維持されることが多い
          sed -i.bak -E 's/objectVersion = [0-9]+;/objectVersion = 56;/g' "$PBX"
          rm -f "$PBX.bak"
          echo ""
          echo "==> Modified objectVersion:"
          grep -E "objectVersion\s*=" "$PBX" | head -3
          echo ""
          echo "==> Re-trying xcodebuild -list after downgrade:"
          xcodebuild -project "$PROJ" -list || echo "(still failing — Xcode too old)"

      - name: Build Praat (macOS) — try praat_mac first, then fallbacks
        run: |
          PROJ="${{ steps.fetch_xcode.outputs.proj }}"
          for SCHEME in praat_mac praat Praat; do
            echo ""
            echo "================================================"
            echo "Attempt: -scheme $SCHEME"
            echo "================================================"
            if xcodebuild \
                -project "$PROJ" \
                -scheme "$SCHEME" \
                -configuration Release \
                CODE_SIGN_IDENTITY="" \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGNING_ALLOWED=NO \
                -derivedDataPath build/ \
                build 2>&1 | tail -200; then
              echo "==> Build succeeded with scheme: $SCHEME"
              break
            else
              echo "==> Build failed with scheme: $SCHEME, trying next..."
            fi
          done
          # 成果物が存在するか確認
          APP=$(find build -name "*.app" -maxdepth 6 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app produced by any scheme"
            exit 1
          fi
          echo "Built: $APP"

      - name: Package
        run: |
          mkdir -p dist
          APP=$(find build -name "*.app" -maxdepth 6 | head -1)
          if [ -z "$APP" ]; then
            echo "No .app found"; exit 1
          fi
          mv "$APP" "dist/Praat-ja.app"
          cd dist && zip -ry praat-ja-macos.zip Praat-ja.app

      - uses: actions/upload-artifact@v4
        with:
          name: praat-ja-macos
          path: dist/praat-ja-macos.zip
          if-no-files-found: warn

  # -----------------------------------------------------------
  # リリース (タグ push 時のみ)
  # macOS は continue-on-error なので、無くてもリリースは作れる。
  # -----------------------------------------------------------
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: List downloaded artifacts
        run: ls -R dist/
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            dist/praat-ja-linux/praat-ja-linux-x64.tar.gz
            dist/praat-ja-windows/Praat-ja.exe
            dist/praat-ja-macos/praat-ja-macos.zip
          body: |
            ## 非公式 Praat 日本語化版

            ⚠️ これは Praat の **非公式** 日本語化フォークです。
            公式 Praat (Paul Boersma 他, アムステルダム大学) とは無関係です。

            - upstream: ${{ needs.prepare.outputs.praat_tag }}
            - ライセンス: GPL v3 (派生物として継承)
            - ソースコード: <https://github.com/labphonlab/praat-ja-fork>
