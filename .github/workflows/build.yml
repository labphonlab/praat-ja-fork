name: Build Praat (Japanese)

# upstream の Praat ソースに翻訳パッチを当ててから3プラットフォームでビルドする。

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------
  # 翻訳適用 (全ビルドの前段)
  # -----------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      praat_sha: ${{ steps.upstream.outputs.sha }}
      praat_tag: ${{ steps.upstream.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve upstream Praat version
        id: upstream
        run: |
          cd upstream
          SHA=$(git rev-parse HEAD)
          TAG=$(git describe --tags --exact-match 2>/dev/null || git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml

      - name: Apply translations
        run: |
          python3 scripts/apply_translations.py \
            --upstream upstream \
            --translations translations

      - name: Upload patched upstream
        uses: actions/upload-artifact@v4
        with:
          name: patched-upstream
          path: upstream/
          retention-days: 1
          include-hidden-files: true

  # -----------------------------------------------------------
  # Linux ビルド  (top-level Makefile に任せる)
  # -----------------------------------------------------------
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: patched-upstream
          path: upstream/

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libpulse-dev libasound2-dev libjack-jackd2-dev

      - name: Build Praat (Linux x64v3)
        run: |
          cd upstream
          make PRAAT_OS=linux PRAAT_ARCH=x64v3 -j$(nproc) 2>&1 | tail -200 || (
            echo "==> Detailed build failure, last 400 lines:"
            make PRAAT_OS=linux PRAAT_ARCH=x64v3 -j1 2>&1 | tail -400
            exit 1
          )

      - name: Locate praat binary
        id: find_bin
        run: |
          cd upstream
          BIN=$(find . -maxdepth 3 -name "praat" -type f -perm -u+x | head -1)
          if [ -z "$BIN" ]; then
            echo "praat binary not found"; exit 1
          fi
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
          ls -lh "$BIN"

      - name: Verify Japanese strings in binary
        run: |
          BIN="upstream/${{ steps.find_bin.outputs.path }}"
          if strings "$BIN" 2>/dev/null | grep -E '開く|設定|ウィンドウ' >/dev/null; then
            echo "✅ Japanese strings present in binary"
          else
            echo "⚠️ Japanese strings not found by 'strings' (may be UTF-16/32 encoded)"
          fi

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/praat-ja-linux-x64.tar.gz -C upstream "${{ steps.find_bin.outputs.path }}"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: praat-ja-linux
          path: dist/praat-ja-linux-x64.tar.gz

  # -----------------------------------------------------------
  # Windows ビルド (MSYS2 + CLANG64)
  # -----------------------------------------------------------
  build-windows:
    needs: prepare
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: patched-upstream
          path: upstream/

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            make
            pkg-config
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-pkgconf

      - name: Build Praat (Windows x64v3)
        run: |
          cd upstream
          make PRAAT_OS=windows PRAAT_ARCH=x64v3 -j$(nproc) 2>&1 | tail -200 || (
            echo "==> Detailed build failure, last 400 lines:"
            make PRAAT_OS=windows PRAAT_ARCH=x64v3 -j1 2>&1 | tail -400
            exit 1
          )

      - name: Locate Praat.exe
        id: find_bin
        run: |
          cd upstream
          BIN=$(find . -maxdepth 3 -iname "praat*.exe" | head -1)
          if [ -z "$BIN" ]; then
            echo "Praat.exe not found"; exit 1
          fi
          echo "path=$BIN" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          mkdir -p dist
          cp "upstream/${{ steps.find_bin.outputs.path }}" dist/Praat-ja.exe
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: praat-ja-windows
          path: dist/Praat-ja.exe

  # -----------------------------------------------------------
  # macOS ビルド
  # Xcode プロジェクトは source repo に無いので、最新リリースの
  # praatXXXX_xcodeproj.zip を取得して source tree に展開してから build.
  # -----------------------------------------------------------
  build-macos:
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: patched-upstream
          path: upstream/

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Fetch xcodeproj.zip from latest Praat release
        id: fetch_xcode
        run: |
          # 最新リリースから xcodeproj.zip の URL を取得
          API="https://api.github.com/repos/praat/praat.github.io/releases/latest"
          URL=$(curl -fsSL "$API" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if 'xcodeproj' in a['name'] and a['name'].endswith('.zip'):
                  print(a['browser_download_url']); break
          ")
          echo "Downloading: $URL"
          curl -fsSL -o xcodeproj.zip "$URL"
          # source tree に展開 (upstream/ の中に praat.xcodeproj が出来る)
          unzip -q xcodeproj.zip -d upstream/
          ls -la upstream/ | head -20
          # xcodeproj の場所を特定
          PROJ=$(find upstream -maxdepth 3 -name "*.xcodeproj" -type d | head -1)
          if [ -z "$PROJ" ]; then
            echo "xcodeproj not found after extraction"
            find upstream -maxdepth 3 -type d | head -20
            exit 1
          fi
          echo "proj=$PROJ" >> "$GITHUB_OUTPUT"
          echo "Found: $PROJ"

      - name: List Xcode schemes
        run: |
          xcodebuild -project "${{ steps.fetch_xcode.outputs.proj }}" -list

      - name: Build Praat (macOS)
        run: |
          xcodebuild \
            -project "${{ steps.fetch_xcode.outputs.proj }}" \
            -scheme praat_mac \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/ \
            build 2>&1 | tail -200

      - name: Package
        run: |
          mkdir -p dist
          APP=$(find build -name "*.app" -maxdepth 6 | head -1)
          if [ -z "$APP" ]; then
            echo "Praat.app not found"
            find build -maxdepth 6 -name "*.app" -o -name "praat*" | head -20
            exit 1
          fi
          mv "$APP" "dist/Praat-ja.app"
          cd dist && zip -ry praat-ja-macos.zip Praat-ja.app

      - uses: actions/upload-artifact@v4
        with:
          name: praat-ja-macos
          path: dist/praat-ja-macos.zip

  # -----------------------------------------------------------
  # リリース (タグ push 時のみ)
  # -----------------------------------------------------------
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/praat-ja-linux/praat-ja-linux-x64.tar.gz
            dist/praat-ja-windows/Praat-ja.exe
            dist/praat-ja-macos/praat-ja-macos.zip
          body: |
            ## 非公式 Praat 日本語化版

            ⚠️ これは Praat の **非公式** 日本語化フォークです。
            公式 Praat (Paul Boersma 他, アムステルダム大学) とは無関係です。

            - upstream: ${{ needs.prepare.outputs.praat_tag }}
            - ライセンス: GPL v3 (派生物として継承)
            - ソースコード: <https://github.com/labphonlab/praat-ja-fork>
